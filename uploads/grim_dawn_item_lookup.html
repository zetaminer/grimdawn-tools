
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1rem 0; }
.search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
.search-bar input { flex: 1; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.filters select { font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
.tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.tag { font-size: 12px; padding: 3px 10px; border-radius: 99px; background: var(--color-background-info); color: var(--color-text-info); display: flex; align-items: center; gap: 4px; cursor: pointer; border: none; }
.tag i { font-size: 11px; }
.stat-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.chip { font-size: 12px; padding: 3px 10px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: all 0.1s; }
.chip:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); }
.chip.active { background: var(--color-background-info); color: var(--color-text-info); border-color: transparent; }
.results-meta { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 10px; }
.result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.result-table th { text-align: left; padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); font-weight: 500; font-size: 12px; white-space: nowrap; }
.result-table td { padding: 8px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); vertical-align: top; color: var(--color-text-primary); }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:hover td { background: var(--color-background-secondary); }
.badge { display: inline-block; font-size: 11px; padding: 2px 7px; border-radius: 99px; white-space: nowrap; }
.badge-aug-weapon { background: #E6F1FB; color: #0C447C; }
.badge-aug-accessory { background: #EAF3DE; color: #27500A; }
.badge-aug-armor { background: #EEEDFE; color: #3C3489; }
.badge-comp-common { background: #FAEEDA; color: #633806; }
.badge-comp-rare { background: #FAECE7; color: #712B13; }
.match-stat { color: var(--color-text-info); font-weight: 500; }
.no-results { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
.section-divider { font-size: 11px; color: var(--color-text-tertiary); padding: 6px 10px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); font-weight: 500; letter-spacing: 0.03em; }
</style>

<div class="wrap">
<h2 class="sr-only">Grim Dawn augment and component lookup tool — search by stat to find matching items</h2>

<div class="search-bar">

<div class="results-meta" id="resultsMeta">Showing all items</div>
<div style="overflow-x:auto;">

  </thead>
  <tbody id="resultsBody"></tbody>
</table>
</div>
</div>

let activeTags = [];

function buildChips() {
  const c = document.getElementById('quickChips');
  c.innerHTML = QUICK_STATS.map(s =>
    `<button class="chip" onclick="toggleChip(this,'${s}')">${s}</button>`
  ).join('');
}

function toggleChip(el, stat) {
  const idx = activeTags.indexOf(stat);
  if (idx === -1) { activeTags.push(stat); el.classList.add('active'); }
  else { activeTags.splice(idx,1); el.classList.remove('active'); }
  renderTags();
  doSearch();
}

function renderTags() {
  const r = document.getElementById('tagRow');
  if (activeTags.length === 0) {
    r.innerHTML = '<span style="font-size:12px;color:var(--color-text-tertiary);">None</span>';
    return;
  }
  r.innerHTML = activeTags.map(t =>
    `<button class="tag" onclick="removeTag('${t}')"><i class="ti ti-x" aria-hidden="true"></i>${t}</button>`
  ).join('');
}

function removeTag(stat) {
  activeTags = activeTags.filter(t => t !== stat);
  document.querySelectorAll('.chip').forEach(el => {
    if (el.textContent === stat) el.classList.remove('active');
  });
  renderTags();
  doSearch();
}

function clearAll() {
  activeTags = [];
  document.getElementById('searchInput').value = '';
  document.getElementById('typeFilter').value = '';
  document.getElementById('slotFilter').value = '';
  document.getElementById('sourceFilter').value = '';
  document.getElementById('levelFilter').value = '';
  document.querySelectorAll('.chip').forEach(el => el.classList.remove('active'));
  renderTags();
  doSearch();
}

const SLOT_KEYWORDS = {
  weapon: ['weapon','gun','crossbow','melee','axe','sword','mace','dagger'],
  ring: ['ring'], amulet: ['amulet'], head: ['head'],
  chest: ['chest'], shoulder: ['shoulder'], legs: ['leg'],
  hands: ['hand'], feet: ['foot','feet','boot'], belt: ['belt'],
  shield: ['shield'], medal: ['medal']
};

function matchesSlot(item, slot) {
  if (!slot) return true;
  const t = (item.appliesTo || '').toLowerCase();
  if (slot === 'weapon') return t.includes('weapon') || t.includes('gun') || t.includes('crossbow') || t.includes('melee') || t.includes('axe') || t.includes('sword');
  return SLOT_KEYWORDS[slot].some(k => t.includes(k));
}

function highlightMatch(text, terms) {
  if (!terms.length) return text;
  let result = text;
  terms.forEach(term => {
    if (!term) return;
    const re = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    result = result.replace(re, '<span class="match-stat">$1</span>');
  });
  return result;
}

const TYPE_LABELS = {
  'aug-weapon': ['Augment – Weapon', 'badge-aug-weapon'],
  'aug-accessory': ['Augment – Accessory', 'badge-aug-accessory'],
  'aug-armor': ['Augment – Armor', 'badge-aug-armor'],
  'comp-common': ['Component – Common', 'badge-comp-common'],
  'comp-rare': ['Component – Rare', 'badge-comp-rare'],
};
const SOURCE_LABELS = {base:'Base Game', aom:'Ashes of Malmouth', fg:'Forgotten Gods'};

function doSearch() {
  const rawQuery = document.getElementById('searchInput').value.trim().toLowerCase();
  const typeF = document.getElementById('typeFilter').value;
  const slotF = document.getElementById('slotFilter').value;
  const sourceF = document.getElementById('sourceFilter').value;
  const levelF = parseInt(document.getElementById('levelFilter').value) || 0;

  const queryTerms = rawQuery ? rawQuery.split(/\s+/) : [];
  const allTerms = [...queryTerms, ...activeTags.map(t => t.toLowerCase())];

  let results = ALL_ITEMS.filter(item => {
    if (typeF && item.type !== typeF) return false;
    if (sourceF && item.source !== sourceF) return false;
    if (levelF && item.level < levelF) return false;
    if (!matchesSlot(item, slotF)) return false;
    if (allTerms.length === 0) return true;
    const haystack = (item.name + ' ' + item.stats + ' ' + item.faction + ' ' + item.appliesTo).toLowerCase();
    return allTerms.every(t => haystack.includes(t));
  });

  results.sort((a,b) => a.level - b.level || a.name.localeCompare(b.name));

  const meta = document.getElementById('resultsMeta');
  meta.textContent = results.length === ALL_ITEMS.length
    ? `Showing all ${ALL_ITEMS.length} items`
    : `${results.length} result${results.length !== 1 ? 's' : ''} found`;

  const tbody = document.getElementById('resultsBody');
  if (results.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-results"><i class="ti ti-mood-sad" aria-hidden="true" style="font-size:24px;display:block;margin-bottom:8px"></i>No items match your search</td></tr>';
    return;
  }

  const hlTerms = allTerms;
  let lastType = null;
  tbody.innerHTML = results.map(item => {
    const [typeLabel, badgeClass] = TYPE_LABELS[item.type];
    let divider = '';
    if (item.type !== lastType) {
      lastType = item.type;
      divider = `<tr><td colspan="6" class="section-divider">${typeLabel}</td></tr>`;
    }
    const src = SOURCE_LABELS[item.source] || item.source;
    const factionSrc = item.faction !== 'Drop/Craft' ? `${item.faction} <span style="color:var(--color-text-tertiary);">(${src})</span>` : `<span style="color:var(--color-text-tertiary);">${src} – Drop/Craft</span>`;
    return `${divider}<tr>
      <td style="font-weight:500;white-space:nowrap">${highlightMatch(item.name, hlTerms)}</td>
      <td><span class="badge ${badgeClass}">${typeLabel}</span></td>
      <td style="font-size:12px;color:var(--color-text-secondary)">${highlightMatch(item.appliesTo, hlTerms)}</td>
      <td style="font-size:12px">${highlightMatch(item.stats, hlTerms)}</td>
      <td style="font-size:12px">${factionSrc}</td>
      <td style="text-align:center;font-size:12px;color:var(--color-text-secondary)">${item.level}</td>
    </tr>`;
  }).join('');
}

buildChips();
doSearch();
</script>
